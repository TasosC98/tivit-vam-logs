experiment:
  name: TiViT-Piano GCR basic
  seed: 1332
  deterministic: false
  output_dir: outputs
logging:
  log_dir: /home/achatzigiannis/tivit-logs/manual_training_keyroi/sweeps/pitch_density_epoch_7/thr_0p8
  checkpoint_dir: /home/achatzigiannis/tivit-logs/manual_training_keyroi/checkpoints
  tensorboard: true
  postproc_debug: false
inference:
  output_dir: inference_results
  predict_on_train: false
dataset:
  name: PianoVAM
  root_dir: /raid_storage/data_achatzigiannis/PianoVAM_v1.0
  annotations_root: /raid_storage/data_achatzigiannis/PianoVAM_v1.0
  label_format: midi
  offset_column: key_offset
  label_targets:
  - pitch
  - onset
  - offset
  - hand
  - clef
  max_clips: null
  manifest:
    train: data/PianoVAM_v1.0/manifest.json
    val: data/PianoVAM_v1.0/manifest.json
    test: data/PianoVAM_v1.0/manifest.json
  split: train
  split_train: train
  split_val: valid
  split_test: test
  frames: 96
  decode_fps: 60.0
  hop_seconds: 0.03333333333333333
  skip_seconds: 8.0
  resize:
  - 180
  - 1536
  tiles: 3
  channels: 3
  grayscale: true
  normalize: true
  apply_crop: true
  canonical_hw:
  - 180
  - 1536
  registration:
    enable: true
    cache_path: reg_refined_pianovam.json
    source: metadata
    interp: bilinear
    global_aug:
      enabled: false
      resize_jitter:
      - 185
      - 1540
      random_crop_hw:
      - 180
      - 1536
      color_jitter:
        brightness: 0.1
        contrast: 0.1
  avlag:
    enable: false
  crop_rescale: auto
  include_low_res: false
  batch_size: 1
  num_workers: 0
  prefetch_factor: 2
  shuffle: true
  sampler:
    mode: onset_balanced
    onset_frac: 0.5
    nearmiss_frac: 0.25
    bg_frac: 0.25
    nearmiss_radius: 6
  require_labels: true
  frame_targets:
    enable: true
    tolerance: 0.1
    dilate_active_frames: 0
    fill_mode: overlap
    hand_from_pitch: true
    clef_thresholds:
    - 60
    - 64
    note_min: 21
    note_max: 108
    cache_labels: false
    cache_dir: .cache/labels
    targets_sparse: true
  hand_supervision:
    enable: false
    min_confidence: 0.05
    time_tolerance: 0.05
    max_dx: 0.12
    min_points: 4
    reach:
      enable: true
      radius: 0.12
      dilate_margin: 0.02
      min_points: 4
  testing:
    canary_json: tivit/tests/resources/pianovam_canaries.json
    default_canary_count: 2
    regen_canaries: false
    enable_cache_equiv: false
    enable_audit_export: true
    audit_dir: tivit/tests/resources/audit/pianovam
    cache_off: false
    strict_sampling: false
    strict_labels: false
    strict_fallback: false
    log_level: detailed
    export_report_json: true
    report_json_path: tivit/tests/resources/audit/pianovam/model_readiness_report.jsonl
    max_event_examples: 2
    warn_fps_tolerance: 0.5
    warn_out_of_window_ratio: 0.2
    enable_debug_extras: false
  hdf5_root: /raid_storage/data_achatzigiannis/PianoVAM_v1.0/HDF5
  pin_memory: true
  preprocessed_format: hdf5
model:
  name: TiViT-Piano
  backend: vivit
  head_mode: frame
  transformer:
    type: ViViT
    input_patch_size: 16
    tube_size: 2
    d_model: 192
    num_heads: 3
    depth_temporal: 1
    depth_spatial: 1
    depth_global: 1
    global_tokens: 2
    mlp_ratio: 3.0
    dropout: 0.2
tiling:
  patch_w: 16
  tokens_split: auto
  overlap_tokens: 0
training:
  epochs: 200
  learning_rate: 3e-5
  weight_decay: 0.01
  eval_freq: 1
  debug_dummy_labels: false
  log_interval: 5
  save_every: 1
  amp: false
  resume: false
  reset_head_bias: true
  soft_targets:
    enabled: true
    apply_to:
      onset: true
      pitch: true
      offset: false
    onset_kernel:
    - 0.5
    - 1.0
    - 0.5
    frame_kernel:
    - 0.5
    - 1.0
    - 0.5
  metrics:
    prob_threshold: 0.005
    prob_threshold_onset: 0.005
    prob_threshold_offset: 0.006
    prob_temperature: 1.0
    prob_temperature_onset: 1.0
    prob_temperature_offset: 1.0
    prob_logit_bias: 0.0
    prob_logit_bias_onset: 0.0
    prob_logit_bias_offset: 0.0
    eval_mode: both
    patk:
      fps: 30.0
      onset_tolerance_ms: 100.0
      onset_sigma: 0.2
      onset_radius: 8
      frame_sigma: 0.8
      frame_radius: 4
      threshold: 0.8
      ignore_tail: 4
      offset_ratio: 0.2
      offset_min_tolerance: 0.05
      top_k: 10
    decoder:
      onset:
        open: 0.02
        hold: 0.0036
        min_on: 1
        min_off: 1
        merge_gap: 0
        median: 1
        low_ratio: 0.6
      offset:
        open: 0.02
        hold: 0.0042
        min_off: 1
        merge_gap: 0
        median: 1
        low_ratio: 0.6
        min_on: 1
    temporal_decoder:
      shared:
        low_ratio: 0.6
        min_on: 2
        min_off: 2
        gap_merge: 1
        median: 3
    aggregation:
      mode: k_of_p
      k:
        onset: 1
        offset: 1
      top_k: 7
      tau_sum: 0.0
    sweep:
      floor_band:
      - 0.2
      - 0.3
      - 0.4
      threshold_mode: quantile
      quantile_values:
      - 0
      - 50
      - 70
      - 80
      - 90
      - 95
      - 98
      - 99
      include_max_quantile: true
    key_probe:
      threshold: 0.8
      top_k: 10
  best_selection:
    mode: calibrated_event
    trigger: on_proxy_improvement
    n: 1
    write_back: false
    sweep:
      delta: 0.05
      low_guard: 0.1
    min_prob: 0.02
    max_prob: 0.98
  loss:
    pos_weight_path: tivit/logs/pos_weights.json
    head_weights:
      pitch: 1.0
      onset: 1.5
      offset: 1.5
      hand: 0.0
      clef: 0.0
    ema_alpha: 0.05
    neg_smooth_onoff: 0.0
    per_tile:
      enabled: true
      heads:
      - pitch
      - onset
      - offset
      mask_cushion_keys: null
      debug:
        enabled: false
        interval: 200
    heads:
      pitch:
        loss: bce
        pos_weight_mode: adaptive_band
        pos_weight: null
        pos_weight_band:
        - 2.0
        - 4.0
      onset:
        loss: bce
        pos_weight_mode: adaptive_band
        pos_weight: null
        pos_weight_band:
        - 4.0
        - 12.0
        focal_gamma: 2.0
        focal_alpha: 0.25
        prior_mean: 0.006626
        prior_weight: 0.0
      offset:
        loss: bce
        pos_weight_mode: adaptive_band
        pos_weight: null
        pos_weight_band:
        - 4.0
        - 12.0
        focal_gamma: 2.5
        focal_alpha: 0.2
        prior_mean: 0.00608
        prior_weight: 0.0
      hand:
        loss: ce
      clef:
        loss: ce
  grad_clip: 1.0
optim:
  grad_clip: 1.0
  head_lr_multiplier: 1.0
  offset_weight_decay_multiplier: 1.0
train:
  accumulate_steps: 4
  freeze_backbone_epochs: 0
decoder:
  global_fusion:
    enabled: true
    mode: masked_mean
    cushion_keys: 2
    apply_to:
    - pitch
    - onset
    - offset
    weighting: uniform
    consistency_check:
      enabled: false
      batches: 2
  post:
    snap:
      enabled: false
      bpm_min: 40
      bpm_max: 240
      bpm_step: 1
      local_window_beats: 4
      max_dev_ms: 35
      blend: 0.5
      min_support_notes: 12
      confidence_floor: 0.15
    dp:
      enabled: false
      min_on_beats: 0.25
      min_off_beats: 0.25
      penalty_on: 0.5
      penalty_off: 0.5
      keep_gates: false
      per_key: true
      beam: 5
      emission_mode: logit
      emission_gain: 4.0
      emission_bias: 0.0
    key_prior:
      enabled: false
    hand_gate:
      enabled: false
priors:
  enabled: false
  hand_gating:
    mode: loss_reweight
    strength: 0.75
    apply_to:
    - pitch
    - onset
    - offset
    decode_mode: multiply
    decode_strength: null
    clef_thresholds: null
    note_min: null
  chord_smoothness:
    strength: 0.15
  key_signature:
    ref_head: onset
    apply_to:
    - onset
    - offset
    window_sec: 3.0
    beta: 4.0
    rho_uniform: 0.8
    prior_strength: 0.5
    epsilon: 1.0e-08
    fps: null
    midi_low: 21
    midi_high: null
autopilot:
  enable_training: true
  best_selection:
    owner: autopilot
  fast_strategy: two_stage
  onset_optimizer:
    open_grid:
    - 0.01
    - 0.015
    - 0.02
    - 0.03
    min_on_grid:
    - 2
    - 3
    hold_mode: fixed_ratio
    hold_delta: 0.06
    hold_min: 0.003
    hold_ratio: 0.75
    merge_gap: 1
    thr_anchor: 0.2
    thr_add_delta: 0.01
    thr_add_steps: 5
    thr_mul_ratio: 1.1
    thr_mul_orders: 1
    thr_min_prob: 0.005
    thr_max_prob: 0.98
    thr_low_guard: 0.01
    thr_high_guard: 0.6
    thr_min_points: 5
    thr_max_points: 11
  offset_optimizer:
    thr_anchor: 0.3
    thr_add_delta: 0.01
    thr_add_steps: 5
    thr_mul_ratio: 1.1
    thr_mul_orders: 1
    thr_min_prob: 0.02
    thr_max_prob: 0.98
    thr_low_guard: 0.02
    thr_high_guard: 0.95
    thr_min_points: 5
    thr_max_points: 11
calibration:
  output_path: /home/achatzigiannis/tivit-logs/manual_training_keyroi/sweeps/keyroi_v1/epoch_7/calibration.json
